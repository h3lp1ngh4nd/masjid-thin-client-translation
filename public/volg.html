<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>Meelezen — Live Caption</title>
  <link rel="icon" href="data:," />
  <style>
    @font-face {
      font-family: "Noto Naskh Arabic Honorifics";
      src: url("/NotoNaskhArabic-Regular.ttf") format("truetype");
      font-style: normal;
      font-weight: 100 900;
      font-display: swap;
    }
    :root {
      color-scheme: dark;
      --bg: #0b1220;
      --text: #f3f6fb;
      --history: #9aa7ba;
      --current-bg: rgba(56, 189, 248, 0.10);
      --current-border: #38bdf8;
      --status: #64748b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
    }
    #status {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      padding: calc(env(safe-area-inset-top, 0px) + 6px) 12px 6px;
      font-size: 0.8rem;
      color: var(--status);
      background: linear-gradient(var(--bg) 75%, transparent);
      z-index: 2;
      text-align: center;
    }
    #status.offline { color: #fca5a5; }
    #captions {
      padding: calc(env(safe-area-inset-top, 0px) + 2.4rem) 1rem
        calc(env(safe-area-inset-bottom, 0px) + 3.4rem);
      max-width: 44rem;
      margin: 0 auto;
    }
    .caption {
      color: var(--history);
      font-size: 1.15rem;
      line-height: 1.5;
      margin: 0 0 0.9rem;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .caption.current {
      color: var(--text);
      font-size: 1.3rem;
      background: var(--current-bg);
      border-left: 3px solid var(--current-border);
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
    }
    .honorific {
      display: inline-block;
      direction: rtl;
      unicode-bidi: isolate;
      font-family: "Noto Naskh Arabic Honorifics", "DejaVu Sans", sans-serif;
      font-size: 1.08em;
      font-style: normal;
      font-weight: 400;
      line-height: 1;
      vertical-align: -0.06em;
      white-space: nowrap;
    }
    .no-break-segment { white-space: nowrap; }
    #empty {
      color: var(--status);
      text-align: center;
      margin-top: 40vh;
      font-size: 1rem;
    }
    #betaNotice {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0.45rem 1rem calc(env(safe-area-inset-bottom, 0px) + 0.45rem);
      color: var(--status);
      background: linear-gradient(transparent, var(--bg) 35%);
      font-size: 0.75rem;
      text-align: center;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div id="status">verbinden…</div>
  <main id="captions" aria-live="polite">
    <div id="empty">__VOLG_EMPTY_TEXT__</div>
  </main>
  <footer id="betaNotice">__VOLG_FOOTER_TEXT__</footer>

  <script>
    const connectedStatusText = __VOLG_HEADER_TEXT_JSON__;
    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    const statusEl = document.getElementById('status');
    const captionsEl = document.getElementById('captions');
    const emptyEl = document.getElementById('empty');
    const maxCaptions = __MAX_CAPTIONS__;

    let ws = null;
    let reconnectTimer = null;
    let reconnectAttempts = 0;
    let seenIds = [];

    function setStatus(text, offline = false) {
      statusEl.textContent = text;
      statusEl.classList.toggle('offline', offline);
    }

    function nearBottom() {
      const doc = document.documentElement;
      return window.innerHeight + window.scrollY >= doc.scrollHeight - 120;
    }

    function captionIds(caption) {
      const ids = [];
      if (caption && caption.id) ids.push(String(caption.id));
      if (caption && Array.isArray(caption.merged_caption_ids)) {
        caption.merged_caption_ids.forEach(id => {
          const normalized = String(id || '').trim();
          if (normalized && !ids.includes(normalized)) ids.push(normalized);
        });
      }
      return ids;
    }

    function protectLineStartPunctuation(text) {
      return String(text || '').replace(/([,.;:!?،؛])/gu, '\u2060$1');
    }

    function appendCaptionText(row, text) {
      const parts = String(text || '').split(/([\uFDFA\uFDFB])/u);
      for (let index = 0; index < parts.length; index += 1) {
        const part = parts[index];
        if (!part) continue;
        if (part === '\uFDFA' || part === '\uFDFB') {
          const segment = document.createElement('span');
          segment.className = 'no-break-segment';
          const honorific = document.createElement('span');
          honorific.className = 'honorific';
          honorific.dir = 'rtl';
          honorific.textContent = part;
          segment.appendChild(honorific);

          const nextPart = parts[index + 1] || '';
          const punctuation = nextPart.match(/^([,.;:!?،؛]+)/u);
          if (punctuation) {
            segment.appendChild(document.createTextNode(punctuation[1]));
            parts[index + 1] = nextPart.slice(punctuation[1].length);
          }
          row.appendChild(segment);
        } else {
          row.appendChild(
            document.createTextNode(protectLineStartPunctuation(part))
          );
        }
      }
    }

    function addCaption(caption, scroll = true) {
      if (!caption || !caption.text) return;
      const ids = captionIds(caption);
      if (ids.some(id => seenIds.includes(id))) return;
      seenIds.push(...ids);
      if (seenIds.length > maxCaptions * 4) {
        seenIds = seenIds.slice(-maxCaptions * 2);
      }
      emptyEl.hidden = true;
      const stickToBottom = scroll && nearBottom();
      const previous = captionsEl.querySelector('.caption.current');
      if (previous) previous.classList.remove('current');
      const row = document.createElement('p');
      row.className = 'caption current';
      appendCaptionText(row, caption.text);
      captionsEl.appendChild(row);
      while (captionsEl.querySelectorAll('.caption').length > maxCaptions) {
        captionsEl.querySelector('.caption').remove();
      }
      if (stickToBottom) {
        window.scrollTo({ top: document.documentElement.scrollHeight });
      }
    }

    function clearCaptions() {
      captionsEl.querySelectorAll('.caption').forEach(row => row.remove());
      seenIds = [];
      emptyEl.hidden = false;
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      const delay = Math.min(500 * (2 ** reconnectAttempts), 5000);
      reconnectAttempts += 1;
      setStatus('verbinding verbroken — opnieuw verbinden…', true);
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connect();
      }, delay);
    }

    function connect() {
      const socket = new WebSocket(`${wsProto}://${location.host}/ws/view`);
      ws = socket;
      socket.onopen = () => {
        reconnectAttempts = 0;
        setStatus(connectedStatusText);
      };
      socket.onmessage = event => {
        try {
          const message = JSON.parse(event.data);
          if (message.type === 'display_state') {
            // Reconnect backfill: only follow to the newest caption if the
            // reader was already at the bottom before the rebuild.
            const stickToBottom = nearBottom();
            clearCaptions();
            const releasedBackfill = Array.isArray(message.released_captions)
              ? message.released_captions
              : (Array.isArray(message.captions) ? message.captions : []);
            releasedBackfill
              .forEach(caption => addCaption(caption, false));
            if (stickToBottom) {
              window.scrollTo({ top: document.documentElement.scrollHeight });
            }
          } else if (message.type === 'caption') {
            addCaption(message.caption);
          } else if (message.type === 'clear_captions') {
            clearCaptions();
          }
          // display_settings/test_state are projector concerns; ignored here.
        } catch (error) {
          console.error('volg message error', error);
        }
      };
      socket.onclose = () => {
        if (ws === socket) scheduleReconnect();
      };
      socket.onerror = () => socket.close();
    }

    // Best-effort screen wake lock so the phone stays readable during the
    // khutbah; silently unsupported on older browsers/plain http.
    let wakeLock = null;
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          wakeLock = await navigator.wakeLock.request('screen');
        }
      } catch (error) {
        wakeLock = null;
      }
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });

    connect();
    requestWakeLock();
  </script>
</body>
</html>
